name: Coletar mais lidas

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependências
        run: pip install requests beautifulsoup4
      - name: Rodar coleta
        run: python coletar.py
      - name: Salvar dados.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dados.json
          git commit -m "Atualiza dados $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "sem mudancas"
          git push

  reagendar:
    needs: coletar
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Esperar 10 minutos e disparar de novo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 300
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/coleta.yml/dispatches \
            -d '{"ref":"main"}'
